<!DOCTYPE html>
<html>
<head>
  <title>Result</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    .percent {
      font-size: 60px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 10px #FFD700,
                   0 0 20px #FFD700,
                   0 0 40px #FFD700;
    }

    .tag {
      font-size: 18px;
      margin: 10px 0;
      color: #ccc;
    }

    canvas {
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 12px;
      border: none;
      background: #FFD700;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    /* 🔥 Neon AJ */
    .watermark {
      position: fixed;
      bottom: 20px;
      right: 25px;
      font-size: 50px;
      font-weight: bold;
      color: #FFD700;
      opacity: 0.15;
      text-shadow: 0 0 10px #FFD700,
                   0 0 20px #FFD700,
                   0 0 40px #FFD700,
                   0 0 80px #FFD700;
    }

  </style>
</head>

<body>

<div class="watermark">AJ</div>

<div class="box">

  <div class="percent">{{percent}}%</div>

  <div class="tag">
    {% if percent < 40 %}
      Low Placement Chance
    {% elif percent < 70 %}
      Moderate Chance
    {% else %}
      High Placement Chance
    {% endif %}
  </div>

  <!-- Donut Chart -->
  <div style="position: relative; margin-top: 20px;">
    <canvas id="chart"></canvas>
    <div style="
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      font-weight: bold;
      color: #FFD700;
    ">
      {{percent}}%
    </div>
  </div>

  <p style="margin-top:15px; color:#aaa;">{{suggestion}}</p>

  <a href="/"><button>Try Again</button></a>

</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'doughnut',
  data: {
    datasets: [{
      data: [{{percent}}, 100 - {{percent}}],
      backgroundColor: ['#FFD700', '#222']
    }]
  },
  options: {
    cutout: '75%',
    plugins: {
      legend: { display: false }
    }
  }
});
</script>

</body>
</html>
